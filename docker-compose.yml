services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:secret@db:5432/goinglive
      - NEXTAUTH_SECRET=changeme
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=goinglive
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    restart: unless-stopped

volumes:
  postgres_data:
